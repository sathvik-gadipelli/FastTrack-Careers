<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<style>
body { background:#020617; color:white; }

/* Splash */
#splash {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:2rem;
  background:black;
  z-index:9999;
  animation: fadeOut 2s forwards;
  animation-delay:2s;
}
@keyframes fadeOut { to {opacity:0;visibility:hidden;} }

/* Sidebar */
.sidebar {
  width:220px;
  background:#020617;
  position:fixed;
  height:100%;
  padding:20px;
}

.nav-item {
  margin:10px 0;
  cursor:pointer;
}
.nav-item:hover { color:#3b82f6; }

/* Sections */
.section { display:none; }
.active { display:block; }

/* Glass */
.glass {
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:10px;
}

.sidebar { display: none; }
#mainContent { display: none; }

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">⚡ Admin Panel</div>

<!-- 🔐 ADMIN LOGIN -->
<div id="loginBox" class="glass p-6 max-w-md mx-auto mt-20 text-center">
  <h2 class="text-2xl mb-4">Admin Login 🔐</h2>

  <input id="adminEmail" placeholder="Email" class="text-black p-2 w-full mb-3">
  <input id="adminPass" type="password" placeholder="Password" class="text-black p-2 w-full mb-3">

  <button onclick="adminLogin()" class="bg-blue-500 px-4 py-2 w-full rounded">
    Login
  </button>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2 class="text-2xl mb-6 text-blue-400">Admin Panel</h2>

  <div class="nav-item" onclick="showSection('home')">🏠 Dashboard</div>
  <div class="nav-item" onclick="showSection('jobs')">💼 Jobs</div>
  <div class="nav-item" onclick="showSection('users')">👥 Users</div>
  <div class="nav-item" onclick="showSection('applications')">📊 Applications</div>
  <div class="nav-item" onclick="showSection('resumes')">📄 Resumes</div>

  <div class="nav-item text-red-400 mt-6" onclick="logout()">🚪 Logout</div>
</div>
<!-- MAIN CONTENT -->
<div id="mainContent" style="margin-left:240px; padding:20px">

<!-- HOME -->
<div id="home" class="section active">
  <h1 class="text-3xl mb-5">Dashboard</h1>
  <div class="grid grid-cols-2 gap-4">
    <div class="glass">Jobs: <span id="jobCount"></span></div>
    <div class="glass">Users: <span id="userCount"></span></div>
  </div>
</div>

<!-- JOBS -->
<div id="jobs" class="section">
  <h1 class="text-2xl mb-4">Manage Jobs</h1>

  <input id="title" placeholder="Title" class="text-black p-2 m-1">
  <input id="company" placeholder="Company" class="text-black p-2 m-1">
  <input id="location" placeholder="Location" class="text-black p-2 m-1">

  <button onclick="addJob()" class="bg-green-500 px-4 py-2 m-2">Add Job</button>

  <div id="jobList"></div>
</div>

<!-- USERS -->
<div id="users" class="section">
  <h1 class="text-2xl mb-4">Users</h1>
  <div id="userList"></div>
</div>

<!-- RESUMES -->
<div id="resumes" class="section">
  <h1 class="text-2xl mb-4">Resumes</h1>
  <div id="resumeList"></div>
</div>

<!-- APPLICATIONS -->
<div id="applications" class="section">
  <h1 class="text-2xl mb-4">Applications</h1>
  <div id="appList"></div>
</div>

</div>

<!-- 🔥 USER FULL DETAILS PAGE -->
<div id="userDetailsPage" class="hidden" style="margin-left:240px; padding:20px">

  <button onclick="closeUserPage()" 
    class="mb-5 bg-gray-700 px-4 py-2 rounded">
    ← Back
  </button>

  <div class="glass p-6">

    <!-- TOP -->
    <div class="flex items-center gap-6">
      <img id="d_dp" class="w-24 h-24 rounded-full">

      <div>
        <h2 id="d_name" class="text-2xl font-bold"></h2>
        <p id="d_phone"></p>
        <p id="d_email" class="text-gray-400"></p>
      </div>
    </div>

    <hr class="my-5 border-gray-700">

    <!-- DETAILS -->
    <p><b>College:</b> <span id="d_college"></span></p>
    <p><b>Skills:</b> <span id="d_skills"></span></p>

    <hr class="my-5 border-gray-700">

    <!-- RESUME -->
    <h3 class="text-xl mb-2">📄 Resume</h3>
    <p id="d_resume">No resume</p>

    <div class="flex gap-3 mt-3">
      <button id="downloadBtn" class="bg-green-500 px-3 py-2 rounded">
        Download
      </button>

      <button onclick="viewResume('${doc.id}')" class="bg-blue-500 px-2 mt-2">
        View Resume</button>

      <button id="deleteBtn" class="bg-red-500 px-3 py-2 rounded">
        Delete User
      </button>
    </div>

    <hr class="my-5 border-gray-700">

    <!-- APPLICATIONS -->
    <h3 class="text-xl mb-2">📊 Applications</h3>
    <div id="d_apps"></div>

  </div>

</div>

<script>

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAf2IYNW-6nZCCJlpDBkmIh9vp5fkxEV2k",
  authDomain: "fasttrack-careers-eed85.firebaseapp.com",
  projectId: "fasttrack-careers-eed85",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

const ADMIN_EMAIL = "company.rosh07@gmail.com";

// 🔐 AUTH CHECK
auth.onAuthStateChanged(user => {

  if(user){

    document.getElementById("loginBox").style.display = "none";
    document.querySelector(".sidebar").style.display = "block";
    document.getElementById("mainContent").style.display = "block";

      // 🔥 LOAD DATA ONLY AFTER LOGIN
  loadUsers();
  loadResumes();
  loadApplications();

  } else {

    document.getElementById("loginBox").style.display = "block";
    document.querySelector(".sidebar").style.display = "none";
    document.getElementById("mainContent").style.display = "none";

  }

});

// 🚪 LOGOUT FIX
function logout(){
  auth.signOut().then(()=>{
    alert("Logged out ✅");
    location.reload();
  });
}

// NAV
function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// =====================
// 💼 JOBS SYSTEM
// =====================

// ADD / UPDATE JOB
let editJobId = null;

function addJob(){

  const title = document.getElementById("title").value;
  const company = document.getElementById("company").value;
  const location = document.getElementById("location").value;

  if(!title) return alert("Enter title");

  if(editJobId){
    db.collection("jobs").doc(editJobId).update({
      title, company, location
    });
    editJobId = null;
    alert("Updated ✅");
  } else {
    db.collection("jobs").add({
      title, company, location, createdAt:new Date()
    });
    alert("Job Added 🚀");
  }

  document.getElementById("title").value="";
  document.getElementById("company").value="";
  document.getElementById("location").value="";
}

// EDIT
function editJob(id,title,company,location){
  document.getElementById("title").value = title;
  document.getElementById("company").value = company;
  document.getElementById("location").value = location;
  editJobId = id;
}

// DELETE
function deleteJob(id){
  if(confirm("Delete this job?")){
    db.collection("jobs").doc(id).delete();
  }
}

// =====================
// 👥 USERS SYSTEM
// =====================

function loadUsers(){
  db.collection("users").onSnapshot(snap=>{

    console.log("Users count:", snap.size); // debug

    document.getElementById("userCount").innerText = snap.size;

    let html = "";

    if(snap.empty){
      html = "<p>No users found ❌</p>";
    }

    snap.forEach(doc=>{
      const u = doc.data();

      html += `
<div onclick="openUserPage('${doc.id}')" 
     class="glass m-2 p-3 cursor-pointer hover:bg-gray-800">

  <div class="flex items-center gap-3">
    <img src="${u.dp ? u.dp : 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}"
     class="w-10 h-10 rounded-full">

    <div>
      <h3>${u.name || "No Name"}</h3>
      <p class="text-xs">${u.phone || ""}</p>
    </div>
  </div>

  <p class="text-xs mt-2 text-gray-400">${u.email || ""}</p>
  <p class="text-xs">${u.college || ""}</p>
  <p class="text-xs">${u.skills ? u.skills.join(", ") : ""}</p>

</div>`;
    });

    document.getElementById("userList").innerHTML = html;

  }, err=>{
    console.error("ERROR:", err);
  });
}


// DELETE USER
function deleteUser(id){
  if(confirm("Delete user?")){
    db.collection("users").doc(id).delete();
  }
}

// =====================
// 📄 RESUMES (UPGRADED)
// =====================
function loadResumes(){

  db.collection("users").onSnapshot(snap=>{

    let html = "";

    snap.forEach(doc=>{

      const u = doc.data();

      if(u.resume){

        html += `
<div class="glass m-2 p-3 flex justify-between items-center">

  <div>
    <h3>${u.name || "User"}</h3>
    <p class="text-sm">${u.resumeName || "Resume"}</p>
  </div>

  <div class="flex gap-2">
    <button onclick="viewResume('${doc.id}')" 
      class="bg-blue-500 px-3 py-1 rounded">
      View
    </button>

    <button onclick="downloadResume('${doc.id}')" 
      class="bg-green-500 px-3 py-1 rounded">
      Download
    </button>
  </div>

</div>`;
      }

    });

    document.getElementById("resumeList").innerHTML = html || "No resumes ❌";

  });

}

// =====================
// 📊 APPLICATIONS
// =====================

function loadApplications(){
  db.collection("applications").onSnapshot(snapshot=>{

    let html = "";

    snapshot.forEach(doc=>{
      const a = doc.data();

      html += `
<div class="glass m-2 p-3">
  <p>${a.userPhone}</p>
  <p class="text-sm text-gray-400">Applied for: ${a.job}</p>
</div>`;
    });

    document.getElementById("appList").innerHTML = html;
  });
}

// =====================
// 🔐 LOGIN
// =====================

function adminLogin(){
  const email = document.getElementById("adminEmail").value;
  const pass = document.getElementById("adminPass").value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(()=>{
    alert("Admin Login Success 🔥");
  })
  .catch(err=>{
    alert("Login Failed ❌ " + err.message);
  });
}


loadResumes();
loadApplications();

function openUserPage(userId){

  document.getElementById("mainContent").style.display = "none";
  document.getElementById("userDetailsPage").style.display = "block";

  db.collection("users").doc(userId).get().then(doc=>{
    const u = doc.data();

    // BASIC INFO
    document.getElementById("d_dp").src = u.dp || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
    document.getElementById("d_name").innerText = u.name || "No Name";
    document.getElementById("d_phone").innerText = u.phone || "";
    document.getElementById("d_email").innerText = u.email || "";
    document.getElementById("d_college").innerText = u.college || "";
    document.getElementById("d_skills").innerText = u.skills ? u.skills.join(", ") : "";

    // RESUME
    document.getElementById("d_resume").innerText = u.resumeName || "No Resume";

    document.getElementById("downloadBtn").onclick = ()=>{
      if(u.resume){
  const link = document.createElement("a");
  link.href = u.resume;
  link.download = u.resumeName || "resume";
  link.click();
} else {
  alert("No resume ❌");
}
    };

    // DELETE
    document.getElementById("deleteBtn").onclick = ()=>{
      if(confirm("Delete user?")){
        db.collection("users").doc(userId).delete();
        closeUserPage();
      }
    };

    // LOAD APPLICATIONS
    loadUserApplications(u.phone);

  });

}

// CLOSE PAGE
function closeUserPage(){
  document.getElementById("userDetailsPage").style.display = "none";
  document.getElementById("mainContent").style.display = "block";
}

function loadUserApplications(phone){

  db.collection("applications")
    .where("userPhone","==",phone)
    .onSnapshot(snap=>{

      let html = "";

      snap.forEach(doc=>{
        const a = doc.data();

        html += `
<div class="glass m-2 p-2">
  <p>${a.job}</p>
  <p class="text-xs text-gray-400">${new Date(a.appliedAt.seconds*1000).toLocaleString()}</p>
</div>`;
      });

      document.getElementById("d_apps").innerHTML = html || "No applications";

    });

}

function downloadResume(userId){

  db.collection("users").doc(userId).get().then(doc=>{
    const u = doc.data();

    if(u.resume){
      const link = document.createElement("a");
      link.href = u.resume;
      link.download = u.resumeName || "resume";
      link.click();
    } else {
      alert("No resume ❌");
    }

  });

}

function viewResume(userId){

  db.collection("users").doc(userId).get().then(doc=>{
    const u = doc.data();

    if(u.resume){
      window.open(u.resume);
    } else {
      alert("No resume ❌");
    }

  });

}
</script>

</body>
</html>
